services:
  nats:
    profiles: ["local"]
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]

  redis:
    profiles: ["local"]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  slack-orchestrator:
    profiles: ["local"]
    build:
      context: ../slack-orchestrator
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - nats
    ports:
      - "${ORCHESTRATOR_PORT:-8080}:8080"
    environment:
      HTTP_ADDR: ":8080"
      SLACK_BOT_TOKEN: ${ORCHESTRATOR_SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${ORCHESTRATOR_SLACK_APP_TOKEN}
      MULTIAGENT_BOT_USER_IDS: ${MULTIAGENT_BOT_USER_IDS}
      ORCHESTRATOR_NATS_URL: ${ORCHESTRATOR_NATS_URL:-nats://nats:4222}
      ORCHESTRATOR_DISPATCH_ENABLED: "true"
      ORCHESTRATOR_TOOL_INTENT_ROUTING_ENABLED: ${ORCHESTRATOR_TOOL_INTENT_ROUTING_ENABLED:-true}
      ORCHESTRATOR_TERMS_REDIS_URL: ""
    volumes:
      - type: bind
        source: ../slack-orchestrator
        target: /src
      - slack_orchestrator_gomod:/go/pkg/mod
      - slack_orchestrator_gocache:/root/.cache/go-build

  agent-joanne:
    profiles: ["local"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - nats
      - redis
    environment:
      AGENT_FACTORY_MODE: ${AGENT_FACTORY_MODE:-serve}
      EMPLOYEE_ID: "joanne"
      NATS_DURABLE_NAME: ${JOANNE_NATS_DURABLE_NAME:-agent-factory-joanne}
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BYOK_GEMINI_API_KEY: ${BYOK_GEMINI_API_KEY}
      GEMINI_ENABLE_WEB_RESEARCH: ${GEMINI_ENABLE_WEB_RESEARCH}
      SHARED_CONTRACTS_DIR: ${SHARED_CONTRACTS_DIR:-/workspace/shared-contracts}
      SKILL_FACTORY_DIR: ${SKILL_FACTORY_DIR:-/workspace/skill-factory}
      SKILL_TOOL_SPECS_DIR: ${SKILL_TOOL_SPECS_DIR:-/workspace/skill-factory/tools/v1}
      MEMORY_BANK_FILE: ${MEMORY_BANK_FILE:-/workspace/shared-contracts/memory-bank.v1.json}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_STREAM: ${NATS_STREAM:-SLACK_WORK}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_INTERNAL_SERVICE_TOKEN: ${BACKEND_INTERNAL_SERVICE_TOKEN}
      SLACK_BOT_TOKEN: ${JOANNE_SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${JOANNE_SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      # Needed so thread replies after internal handoff post as Ross (same token as agent-ross).
      ROSS_SLACK_BOT_TOKEN: ${ROSS_SLACK_BOT_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-BimRoss}
      GITHUB_REPO: ${GITHUB_REPO:-create-issue}
      JOANNE_GITHUB_TOKEN: ${JOANNE_GITHUB_TOKEN:-}
      JOANNE_GITHUB_OWNER: ${JOANNE_GITHUB_OWNER:-}
      JOANNE_GITHUB_REPO: ${JOANNE_GITHUB_REPO:-}
      # Same keys as agent-ross so internal handoff (e.g. Joanne → Ross create-issue) can load ROSS_* while still running in this container.
      ROSS_GITHUB_TOKEN: ${ROSS_GITHUB_TOKEN:-}
      ROSS_GITHUB_OWNER: ${ROSS_GITHUB_OWNER:-}
      ROSS_GITHUB_REPO: ${ROSS_GITHUB_REPO:-}
    volumes:
      - type: bind
        source: ../shared-contracts
        target: /workspace/shared-contracts
      - type: bind
        source: ../skill-factory
        target: /workspace/skill-factory

  agent-ross:
