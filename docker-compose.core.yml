      SLACK_BOT_TOKEN: ${ANNA_SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${ANNA_SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-BimRoss}
      GITHUB_REPO: ${GITHUB_REPO:-create-issue}
      ANNA_GITHUB_TOKEN: ${ANNA_GITHUB_TOKEN:-}
      ANNA_GITHUB_OWNER: ${ANNA_GITHUB_OWNER:-}
      ANNA_GITHUB_REPO: ${ANNA_GITHUB_REPO:-}
    volumes:
      - type: bind
        source: ../shared-contracts
        target: /workspace/shared-contracts
      - type: bind
        source: ../skill-factory
        target: /workspace/skill-factory

  skill-factory:
    profiles: ["local"]
    build:
      context: ../skill-factory
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          skill-factory-validate /workspace/skill-factory/skills/v1/*-*.md
          sleep 300
        done
    volumes:
      - type: bind
        source: ../skill-factory
        target: /workspace/skill-factory

  shared-contracts:
    profiles: ["local"]
    build:
      context: ../shared-contracts
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          cd /workspace/shared-contracts && shared-contracts-validate
          sleep 300
        done
    volumes:
      - type: bind
        source: ../shared-contracts
        target: /workspace/shared-contracts

volumes:
  slack_orchestrator_gomod:
  slack_orchestrator_gocache:
