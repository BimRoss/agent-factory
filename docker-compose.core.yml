      ROSS_GITHUB_TOKEN: ${ROSS_GITHUB_TOKEN:-}
      ROSS_PERSONAL_GH_TOKEN: ${ROSS_PERSONAL_GH_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      JOANNE_GOOGLE_CLIENT_ID: ${JOANNE_GOOGLE_CLIENT_ID:-}
      JOANNE_GOOGLE_CLIENT_SECRET: ${JOANNE_GOOGLE_CLIENT_SECRET:-}
      JOANNE_GOOGLE_REFRESH_TOKEN: ${JOANNE_GOOGLE_REFRESH_TOKEN:-}
      # Gmail From: line for create-email (must match the Google account behind the refresh token).
      JOANNE_GOOGLE_SENDER_EMAIL: ${JOANNE_GOOGLE_SENDER_EMAIL:-}
      GOOGLE_SENDER_EMAIL: ${GOOGLE_SENDER_EMAIL:-}
      ONBOARDING_CHANNEL: ${ONBOARDING_CHANNEL:-}
      MAKEACOMPANY_APP_BASE_URL: ${MAKEACOMPANY_APP_BASE_URL:-http://localhost:3000}
      SLACK_USERS_SNAPSHOT_REFRESH_URL: ${SLACK_USERS_SNAPSHOT_REFRESH_URL:-}
    volumes:
      - type: bind
        source: ../shared-contracts
        target: /workspace/shared-contracts
      - type: bind
        source: ../skill-factory
        target: /workspace/skill-factory

